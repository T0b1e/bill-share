  <!DOCTYPE html>
  <html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>โปรเจคแบ่งบิล</title>
    <!-- ฟอนต์ Prompt -->
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS (optional, for card styling) -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <!-- Tom Select CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
/* ─────────────────────── Base Reset ─────────────────────── */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ─────────────────────── Color Variables ─────────────────────── */
:root {
  --primary-color: #6c757d;
  --income-color: green;
  --expense-color: red;
}

/* ─────────────────── Layout & Body ─────────────────── */
body {
  font-family: "Prompt", sans-serif;
  background: #eef2f5;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.layout {
  display: flex;
  flex-direction: column;
}

/* ─────────────────── Animations ─────────────────── */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─────────────────── User Card ─────────────────── */
.user-card {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  width: 280px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  z-index: 100;
  animation: fadeInDown 0.6s ease forwards;
}

.user-card .toggle-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.user-card h3 {
  margin: 0;
  font-size: 1.2rem;
  color: var(--primary-color);
}

.user-card table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 10px;
}

.user-card th,
.user-card td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: left;
  font-size: 0.95rem;
}

.user-card thead th {
  background: var(--primary-color);
  color: #fff;
}

/* ─────────────────── Tom Select & Small Icon Overrides ─────────────────── */
/* Always show Tom Select remove buttons */
.ts-control .items .item a.remove_button {
  opacity: 1 !important;
  visibility: visible !important;
  transition: none !important;
}
/* Always show small-icon-button */
.small-icon-button,
.small-icon-button .icon {
  opacity: 1 !important;
  transition: none !important;
}

/* ─────────────────── Buttons ─────────────────── */
button {
  background: var(--primary-color);
  color: #fff;
  border: none;
  padding: 8px 15px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.3s ease;
}
button:hover {
  background: #495057;
}

/* Add‐friend button variant */
.btn-add-user {
  display: block;
  margin: 0 auto;
  padding: 6px 12px;
  font-size: 0.9rem;
  border-radius: 4px;
}

/* ─────────────────── Tables & Inputs ─────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 10px;
}
th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: left;
}
th {
  background: var(--primary-color);
  color: #fff;
}

input[type="number"],
input[type="text"],
select,
.ts-control {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 16px;
  transition: border-color 0.3s ease;
}
input:focus,
select:focus {
  border-color: var(--primary-color);
  outline: none;
}
input::placeholder {
  color: #888;
  font-style: italic;
}

/* ─────────────────── Custom color classes ─────────────────── */
.income  { color: var(--income-color); }
.expense { color: var(--expense-color); }

/* ─────────────────── Main Container & Cards ─────────────────── */
.container {
  width: 100%;
  max-width: 900px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  padding: 20px;
  animation: fadeInUp 0.6s ease forwards;
}
.card h2,
.card h3 {
  margin-bottom: 15px;
  color: var(--primary-color);
}
.card p {
  margin-bottom: 10px;
}
#transactionCard {
  min-height: 300px;
}

.user-card td.user-name[contenteditable="true"] {
  outline: 1px dashed var(--primary-color);
}

/* ─────────────────── Responsive (mobile-first) ─────────────────── */
@media (max-width: 768px) {
  /* User card becomes full-width, relative positioning */
  .user-card {
    position: relative;
    top: 0;
    right: 0;
    width: 100%;
    padding: 10px;      /* tighter padding */
    margin-bottom: 20px;
  }
  .user-card .toggle-header {
    margin-bottom: 5px;
  }
  .user-card table {
    margin-bottom: 5px;
  }
  .user-card th,
  .user-card td {
    text-align: right;
    padding: 6px 8px;
  }
  .user-card h3 {
    font-size: 1rem;
  }

  /* Buttons stretch full width, larger tap area */
  button,
  .btn-add-user {
    width: 100%;
    padding: 12px;
    font-size: 18px;
  }

  /* Inputs & selects taller */
  input[type="text"],
  input[type="number"],
  select,
  .ts-control {
    font-size: 16px;
    line-height: 1.4;
    height: 44px;
  }

  /* Table → stacked cards */
  table,
  thead,
  tbody,
  th,
  td,
  tr {
    display: block;
  }
  thead tr {
    position: absolute;
    top: -9999px;
    left: -9999px;
  }
  tr {
    border: 1px solid #ddd;
    margin-bottom: 10px;
  }
  td {
    border: none;
    position: relative;
    padding-left: 50%;
    text-align: right;
  }
  td:before {
    content: attr(data-label);
    position: absolute;
    top: 8px;
    left: 8px;
    width: 45%;
    padding-right: 10px;
    white-space: nowrap;
    font-weight: bold;
    text-align: left;
  }

  /* Small‐icon tweaks */
  .small-icon-button {
    display: flex;               /* enable flex centering */
    justify-content: center;     /* center horizontally */
    align-items: center;         /* center vertically */
    width: 32px !important;
    height: 32px !important;
    padding: 0;                  /* no extra inset */
  }
}

    </style>
  </head>
  <body>

    <div class="layout">
      <!-- User Card -->
      <div class="user-card">
        <div class="toggle-header" style="display: flex; justify-content: space-between; align-items: center;">
          <h3 style="margin: 0;">เพื่อนๆ 😊</h3>
        <button
          id="toggleUserCard"
          class="small-icon-button"
          onclick="toggleUserCard()"
          aria-label="Toggle friends panel"
        >
          <i class="fas fa-minus icon"></i>
        </button>
        </div>
        <div id="userCardContent">
          <table id="userTable">
            <thead>
              <tr>
                <th>ชื่อ</th>
                <th>รับเงิน</th>
                <th>จ่ายเงิน</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody>
              <!-- User rows will be generated dynamically -->
            </tbody>
          </table>
          <button onclick="addUser()">➕ เพิ่มเพื่อน</button>
        </div>
      </div>
      

      <div class="container">
        <!-- Transaction Card -->
        <div class="card" id="transactionCard">
          <h2>รายการ 💸</h2>
          <table id="transactionTable">
            <thead>
              <tr>
                <th>ลำดับ</th>
                <th>จ่ายโดย</th>
                <th>รับโดย</th>
                <th>รายการ</th>
                <th>จำนวน</th>
                <th>ราคา</th>
                <th>#</th>
              </tr>
            </thead>
            <tbody>
              <!-- Transaction rows will be added dynamically -->
            </tbody>
            <tfoot>
              <tr>
                <td colspan="7">
                  รวมจำนวนรายการ: <span id="totalTransactionCount">0</span>
                </td>
              </tr>
            </tfoot>
          </table>
          <button onclick="addTransactionRow()">➕ เพิ่มรายการบิล</button>
        </div>

        <!-- Settlement Card -->
        <div class="card" id="summaryCard">
          <h2>สรุปบิลและค่าธรรมเนียม 📊</h2>
          <p>
            <strong>รวมเงิน:</strong>
            ฿<span id="totalPrice">0.00</span>
          </p>
          <p>
            <label>ค่าบริการ: ฿<input type="number" id="serviceCharge" value="0" onchange="calculateSummary()" /></label>
          </p>
          <p>
            <label>ภาษีมูลค่าเพิ่ม: ฿<input type="number" id="vat" value="0" onchange="calculateSummary()" /></label>
          </p>
          <p>
            <strong>ยอดรวม:</strong>
            ฿<span id="grandTotal">0.00</span>
          </p>

          <h3>สรุปแบ่งบิล 🤝</h3>
          <table id="settlementTable">
            <thead>
              <tr>
                <th>จาก</th>
                <th>ถึง</th>
                <th>จำนวน</th>
              </tr>
            </thead>
            <tbody>
              <!-- Settlement rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  

    <!-- jQuery & Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <!-- Tom Select JS -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script>

      function toggleUserCard() {
        const content      = document.getElementById("userCardContent");
        const toggleButton = document.getElementById("toggleUserCard");
        // grab the <i class="fas fa-minus icon"> inside
        const icon         = toggleButton.querySelector("i.icon");

        if (content.style.display === "none") {
          content.style.display = "block";
          // swap to minus
          icon.classList.replace("fa-plus", "fa-minus");
        } else {
          content.style.display = "none";
          // swap to plus
          icon.classList.replace("fa-minus", "fa-plus");
        }
      }

      // Default 2 users
      let users = [
        { name: "เพื่อนคนที่ 1", income: 0, expense: 0 },
        { name: "เพื่อนคนที่ 2", income: 0, expense: 0 }
      ];

      // Update User Table with inline editing for name
      function updateUserTable() {
        const tbody = document.querySelector("#userTable tbody");
        tbody.innerHTML = "";

        users.forEach((user, index) => {
          const row = document.createElement("tr");
          row.dataset.index = index;

          row.innerHTML = `
            <td class="user-name">${user.name}</td>
            <td class="income">${user.income.toFixed(2)}</td>
            <td class="expense">${user.expense.toFixed(2)}</td>
            <td>
              <button
                class="small-icon-button remove-user-button"
                onclick="removeUser(${index})"
                aria-label="Remove this friend"
              >
                <i class="fas fa-trash icon"></i>
              </button>
            </td>
          `;
          tbody.appendChild(row);

          // ── wire up double-click to enable editing, and blur to save ──
          const nameCell = row.querySelector(".user-name");
          nameCell.style.cursor = "pointer";   // hint it’s editable

          nameCell.addEventListener("dblclick", () => {
            console.log(12313213123)
            nameCell.contentEditable = "true";
            nameCell.focus();
          });

          nameCell.addEventListener("blur", () => {
            if (nameCell.isContentEditable) {
              nameCell.contentEditable = "false";
              renameUser(nameCell);
            }
          });
        });
      }

      // Add new user with default name (editable)
      function addUser() {
        users.push({ name: "เพื่อนคนที่", income: 0, expense: 0 });
        updateUserTable();
        // Instead of destroying all TomSelects, just add one option:
        const newIndex = users.length - 1;
        document.querySelectorAll('select.paidBy, select.paidTo')
          .forEach(select => {
            const ts = select.tomselect;
            ts.addOption({ value: String(newIndex), text: users[newIndex].name });
          });
      updateUserTable();
      refreshAllSelects();      //
      }

      // Rename user on blur event
      function renameUser(cell) {
        const row   = cell.parentElement;
        const index = Number(row.dataset.index);
        const newName = cell.textContent.trim();
        if (!newName) {
          alert("ชื่อต้องไม่ว่าง");
          cell.textContent = users[index].name;
          return;
        }

        // 1) Update the data
        users[index].name = newName;

        // 2) Re-render the friend-list UI
        updateUserTable();

        // 3) Propagate to every TomSelect
        updateAllDropdowns();
        refreshAllSelects();
      }

      function initTomSelect(select) {
        // destroy any old instance
        if (select.tomselect) select.tomselect.destroy();

        // re-init with onChange hooked straight into calculateSummary
        new TomSelect(select, {
          plugins: ['remove_button'],
          persist: false,
          create: false,
          maxItems: null,            // allow multiple
          onChange: calculateSummary // fires when you pick/unpick tags
        });
      }

      function refreshAllSelects() {
        document.querySelectorAll('select.paidBy, select.paidTo')
          .forEach(select => {
            // remember what was selected
            const prev = select.tomselect ? select.tomselect.items.slice() : [];

            // rebuild the <option> list from your up-to-date users[]
            select.innerHTML = users
              .map((u,i) => `<option value="${i}">${u.name}</option>`)
              .join('');

            // re-initialize TomSelect and re-add old selections
            initTomSelect(select);
            if (prev.length) select.tomselect.addItems(prev);
          });
      }

      function removeUser(idx) {
        users.splice(idx,1);
        updateUserTable();
        refreshAllSelects();
        calculateSummary();
      }

          // Add Transaction Row with index and data-labels for mobile
    function addTransactionRow() {
        const tbody = document.querySelector('#transactionTable tbody');
        const tr = document.createElement('tr');
        tr.classList.add('transaction-row');
        tr.innerHTML = `
          <td class="tx-index"></td>
          <td data-label="จ่ายโดย"><select multiple class="paidBy"></select></td>
          <td data-label="รับโดย"><select multiple class="paidTo"></select></td>
          <td data-label="รายการ"><input type="text" class="item" placeholder="ชื่อรายการ"></td>
          <td data-label="จำนวน"><input type="number" class="quantity" value="1" min="1"></td>
          <td data-label="ราคา"><input type="number" class="price" value="0" step="0.01"></td>
          <td data-label="จัดการ"><button onclick="removeRow(this)">ลบ</button></td>`;
        tbody.appendChild(tr);
        // populate & init TomSelect
        refreshAllSelects();
        initTomSelect(tr.querySelector('select.paidBy'));
        initTomSelect(tr.querySelector('select.paidTo'));
        calculateSummary();
      }

      // Initialize Tom Select for new row
      function initializeTomSelectForRow(row) {
        row.querySelectorAll("select").forEach((select) => {
          if (!select.tomselect) {
            new TomSelect(select, {
              plugins: ["remove_button"],
              persist: false,
              create: false,
              maxOptions: users.length,
            });
          }
        });
      }

      function removeRow(btn) {
        const row = btn.closest("tr");
        row.remove();
        calculateSummary();
      }

      function updateAllDropdowns() {
        // For each TomSelect instance on paidBy/paidTo:
        document.querySelectorAll('select.paidBy, select.paidTo').forEach(select => {
          const ts = select.tomselect;
          if (!ts) return;

          // Update each option’s text to match users[i].name
          users.forEach((user, idx) => {
            ts.updateOption(String(idx), { value: String(idx), text: user.name });
          });
          // Refresh the dropdown so the change “sticks”
          ts.refreshOptions(false);
        });
      }

      // Update transaction row indices and footer (total quantity)
      // function updateTransactionIndices() {
      //   const rows = document.querySelectorAll("#transactionTable tbody tr.transaction-row");
      //   rows.forEach((row, index) => {
      //     row.querySelector(".tx-index").textContent = index + 1;
      //   });
      // }

      function updateTransactionFooter() {
        const rows = document.querySelectorAll("#transactionTable tbody tr");
        let totalQuantity = 0;
        rows.forEach((row) => {
          const quantity = parseFloat(row.querySelector(".quantity").value) || 0;
          totalQuantity += quantity;
        });
        document.getElementById("totalTransactionCount").textContent = totalQuantity.toFixed(2);
      }

      // Settlement Calculation with netting and grouping reverse pairs
      function calculateSettlement() {
        // Reset income/expense for each user
        users.forEach((user) => {
          user.income = 0;
          user.expense = 0;
        });

        const settlementBody = document
          .getElementById("settlementTable")
          .querySelector("tbody");
        settlementBody.innerHTML = "";

        // Aggregate amounts for each (payer, recipient) pair
        // Here, key "A-B" means: A paid on behalf of B.
        const summaryMap = {};

        const rows = document.querySelectorAll("#transactionTable tbody tr");
        rows.forEach((row) => {
          const quantity = parseFloat(row.querySelector(".quantity").value) || 0;
          const price = parseFloat(row.querySelector(".price").value) || 0;
          const amount = quantity * price;

          const paidByOptions = Array.from(row.querySelector(".paidBy").selectedOptions).map((opt) =>
            parseInt(opt.value)
          );
          const paidToOptions = Array.from(row.querySelector(".paidTo").selectedOptions).map((opt) =>
            parseInt(opt.value)
          );

          let validPairs = [];
          for (let i = 0; i < paidByOptions.length; i++) {
            for (let j = 0; j < paidToOptions.length; j++) {
              if (paidByOptions[i] !== paidToOptions[j]) {
                validPairs.push({ payer: paidByOptions[i], recipient: paidToOptions[j] });
              }
            }
          }

          if (validPairs.length > 0) {
            const perPairAmount = amount / validPairs.length;
            validPairs.forEach((pair) => {
              // Update user totals
              users[pair.payer].income += perPairAmount;
              users[pair.recipient].expense += perPairAmount;

              const key = `${pair.payer}-${pair.recipient}`;
              if (!summaryMap[key]) {
                summaryMap[key] = 0;
              }
              summaryMap[key] += perPairAmount;
            });
          }
        });

        // Process aggregated pairs and net reverse pairs
        const processed = new Set();
        for (const key in summaryMap) {
          if (processed.has(key)) continue;

          const [payer, recipient] = key.split("-").map(Number);
          const reverseKey = `${recipient}-${payer}`;

          if (summaryMap.hasOwnProperty(reverseKey)) {
            // Both directions exist. Compute net:
            const net = summaryMap[key] - summaryMap[reverseKey];
            if (net === 0) {
              // They cancel each other out.
              const messageRow = document.createElement("tr");
              messageRow.innerHTML = `<td colspan="3">${users[payer].name} กับ ${users[recipient].name} ไม่ต้องจ่ายกันละ</td>`;
              settlementBody.appendChild(messageRow);
            } else if (net > 0) {
              // Net positive: For key "payer-recipient", net > 0 means that user1 (payer) paid more for user2,
              // so the recipient (user2) owes the payer (user1) the net amount.
              // Therefore, display: FROM: user2, TO: user1.
              const settlementRow = document.createElement("tr");
              settlementRow.innerHTML = `
                <td>${users[recipient].name}</td>
                <td>${users[payer].name}</td>
                <td class="income">฿${net.toFixed(2)}</td>
              `;
              settlementBody.appendChild(settlementRow);
            } else {
              // Net negative: summaryMap[key] < summaryMap[reverseKey]
              // That means user2 (in the reverse pair) paid more for user1,
              // so user1 owes user2 the absolute net amount.
              // Therefore, display: FROM: user1, TO: user2.
              const settlementRow = document.createElement("tr");
              settlementRow.innerHTML = `
                <td>${users[payer].name}</td>
                <td>${users[recipient].name}</td>
                <td class="expense">฿${Math.abs(net).toFixed(2)}</td>
              `;
              settlementBody.appendChild(settlementRow);
            }
            processed.add(key);
            processed.add(reverseKey);
          } else {
            // No reverse exists. In this case, we want the settlement to show that
            // the person who "took" (recipient) must pay the one who "paid" (payer).
            // So output: FROM: recipient, TO: payer.
            const settlementRow = document.createElement("tr");
            settlementRow.innerHTML = `
              <td>${users[recipient].name}</td>
              <td>${users[payer].name}</td>
              <td>฿${summaryMap[key].toFixed(2)}</td>
            `;
            settlementBody.appendChild(settlementRow);
            processed.add(key);
          }
        }

        updateUserTable();
        // updateTransactionIndices();
        updateTransactionFooter();
      }


      function calculateSummary() {
        let totalPrice = 0;
        const rows = document.querySelectorAll("#transactionTable tbody tr");
        rows.forEach((row) => {
          const quantity = parseFloat(row.querySelector(".quantity").value) || 0;
          const price = parseFloat(row.querySelector(".price").value) || 0;
          totalPrice += quantity * price;
        });
        document.getElementById("totalPrice").textContent = totalPrice.toFixed(2);

        const serviceCharge = parseFloat(document.getElementById("serviceCharge").value) || 0;
        const vat = parseFloat(document.getElementById("vat").value) || 0;
        const grandTotal = totalPrice + serviceCharge + vat;
        document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);

        calculateSettlement();
      }

      // On DOM load: update user table and add 5 default transaction rows
      document.addEventListener("DOMContentLoaded", function () {
        updateUserTable();
        // updateAllDropdowns();
        for (let i = 0; i < 5; i++) {
          refreshAllSelects();
          addTransactionRow();
        }
      });
    </script>
  </body>
  </html>
